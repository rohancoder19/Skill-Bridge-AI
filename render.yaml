# Render Blueprint Configuration
# For more information, see https://render.com/docs/blueprints

services:
  - type: web
    name: skill-bridge-ai
    runtime: node
    plan: free # Deploys on Render's free tier
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false # User will supply their MongoDB Atlas URI
      - key: GEMINI_API_KEY
        sync: false # User will supply their Google Gemini API Key
      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a secure key if not provided
